name: Security Scan
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 8am UTC

permissions:
  contents: read

jobs:
  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync
      - name: Export third-party Python requirements for auditing
        run: >
          uv export --format requirements.txt --locked --no-header --no-annotate
          --no-emit-project --no-emit-workspace
          --output-file .ci-third-party-requirements.txt
      - name: Filter non-runtime packaging tools
        run: grep -vE '^pip==' .ci-third-party-requirements.txt > .ci-third-party-runtime-requirements.txt
      - name: Check for known vulnerabilities
        run: >
          uv run --no-sync pip-audit --strict --desc
          --requirement .ci-third-party-runtime-requirements.txt
          --no-deps --disable-pip
      - name: Verify no copyleft licenses
        run: |
          set -euo pipefail
          licenses="$(uv run --no-sync pip-licenses --format=csv)"
          if printf '%s\n' "$licenses" | grep -iE ',"[^"]*(GPL|AGPL|SSPL|EUPL|OSL|CPAL)[^"]*"$'; then
            echo "::error::Copyleft license detected — blocked by project policy"
            exit 1
          fi
          echo "License check passed"

  npm-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: cd apps/web && pnpm install --frozen-lockfile
      - name: Audit frontend dependencies
        run: cd apps/web && pnpm audit --audit-level=high --prod

  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
