[project]
name = "nextballup-db"
version = "0.1.0"
description = "NextBallUp database layer — SQLAlchemy models, repositories, migrations"
requires-python = ">=3.12"
dependencies = [
    "nextballup-core",
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.30",
    "alembic>=1.14",
    "greenlet>=3.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nextballup_db"]
