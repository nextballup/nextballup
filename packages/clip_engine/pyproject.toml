[project]
name = "nextballup-clips"
version = "0.1.0"
description = "NextBallUp video clip generation and playlist assembly"
requires-python = ">=3.12,<3.13"
dependencies = [
    "nextballup-core",
    "ffmpeg-python>=0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nextballup_clips"]
