[project]
name = "nextballup-cv"
version = "0.1.0"
description = "NextBallUp computer vision pipeline — detection, tracking, pose, court mapping, events"
requires-python = ">=3.12"
dependencies = [
    "nextballup-core",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "opencv-python-headless>=4.13",
    "numpy>=2.2,<2.5",
    "scipy>=1.14",
    "Pillow>=11.0",
    "onnxruntime>=1.24",
    "protobuf>=5.29,<6",        # Cross-package safe range (onnxruntime + transformers)
    # NOTE: supervision>=0.27 requires opencv-python (GUI). Install with --no-deps
    # and satisfy its other deps manually to avoid conflict with opencv-python-headless.
    # See: uv pip install supervision --no-deps
    "supervision>=0.27",         # Roboflow's CV utilities (MIT) — annotation viz, format conversion
    # NOTE: Do NOT use boxmot. It is AGPL-3.0 for the entire package — importing ANY part
    # triggers copyleft. Use standalone tracker repos instead:
    #   ByteTrack: https://github.com/ifzhang/ByteTrack (MIT)
    #   BoT-SORT: https://github.com/NirAharon/BoT-SORT (MIT)
    #   OC-SORT: https://github.com/noahcao/OC_SORT (MIT)
    "transformers>=5.5",         # ViTPose via HuggingFace, SmolVLM2
    "timm>=1.0",                 # Vision model backbones
    "av>=17.0",                  # PyAV (BSD) — video decoding, replaces abandoned decord
    "filterpy>=1.4",             # Kalman filters for ball state machine (MIT, unmaintained — vendor if issues arise)
]

[project.optional-dependencies]
training = [
    "mmdet>=3.3",           # MMDetection for RF-DETR fine-tuning (Apache-2.0)
    # SECURITY: MMDetection has a known RCE in its distributed training API
    # (unsafe pickle deserialization). Never expose training endpoints publicly.
    "mmpose>=1.3",          # MMPose training pipelines (Apache-2.0)
    "mmengine>=0.10",
    "wandb>=0.19",          # Experiment tracking
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nextballup_cv"]
