[project]
name = "nextballup-cv"
version = "0.1.0"
description = "NextBallUp computer vision pipeline — detection, tracking, pose, court mapping, events"
requires-python = ">=3.12"
dependencies = [
    "nextballup-core",
    "torch>=2.5",
    "torchvision>=0.20",
    "opencv-python-headless>=4.10",
    "numpy>=2.1",
    "scipy>=1.14",
    "Pillow>=11.0",
    "onnxruntime>=1.20",
    "supervision>=0.25",    # Roboflow's CV utilities (MIT) — annotation viz, format conversion
    "boxmot>=11.0",         # Multi-tracker framework (use ONLY MIT trackers: botsort, bytetrack, ocsort)
    "transformers>=4.47",   # ViTPose via HuggingFace, SmolVLM2
    "timm>=1.0",            # Vision model backbones
    "decord>=0.6",          # Fast video reading (Apache-2.0) — 3× faster than OpenCV VideoCapture
    "av>=13.0",             # PyAV (BSD) — programmatic FFmpeg, more reliable than ffmpeg-python
    "filterpy>=1.4",        # Kalman filters for ball tracking state machine (MIT)
]

[project.optional-dependencies]
training = [
    "mmdet>=3.3",           # MMDetection for RF-DETR fine-tuning (Apache-2.0)
    "mmpose>=1.3",          # MMPose training pipelines (Apache-2.0)
    "mmengine>=0.10",
    "wandb>=0.19",          # Experiment tracking
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nextballup_cv"]
