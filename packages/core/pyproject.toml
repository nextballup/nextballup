[project]
name = "nextballup-core"
version = "0.1.0"
description = "NextBallUp domain models, enums, and constants"
requires-python = ">=3.12,<3.13"
dependencies = [
    "prometheus-client>=0.20,<1",
    "pydantic[email]>=2.10",
    "pydantic-settings>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nextballup_core"]
